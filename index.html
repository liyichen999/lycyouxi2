    // 辅助: 清屏

    // 慢速打字 (支持极速模式vv)
    function Slowsay(text) {
        return new Promise((resolve) => {
            if (vv === 1) {
                const line = document.createElement("div");
                line.innerText = text;
                outputElem.appendChild(line);
                outputElem.scrollTop = outputElem.scrollHeight;
                resolve();
                return;
            }
            let i = 0;
            const container = document.createElement("div");
            outputElem.appendChild(container);
            function typeChar() {
                if (i < text.length) {
                    container.innerText += text[i];
                    i++;
                    outputElem.scrollTop = outputElem.scrollHeight;
                    setTimeout(typeChar, 18);
                } else {
                    resolve();
                }
            }
            typeChar();
        });
    }
    
    // 等待用户输入数字 (点击按钮)
    function waitForOption(minVal, maxVal, customOptions = null) {
        return new Promise((resolve) => {
            if (customOptions) {
                currentOptions = customOptions;
            } else {
                currentOptions = [];
                for (let i = minVal; i <= maxVal; i++) {
                    currentOptions.push({ value: i, text: i.toString() });
                }
            }
            awaitingInput = true;
            renderOptions();
            const handler = (val) => {
                cleanup();
                resolve(val);
            };
            function cleanup() {
                awaitingInput = false;
                window.tempChoiceHandler = null;
            }
            window.tempChoiceHandler = handler;
        });
    }
    
    // 特殊双数字输入 (初始分配物资，已去除秘籍功能)
    function waitForTwoNumbers() {
        return new Promise((resolve) => {
            const container = document.createElement("div");
            container.className = "special-input";
            container.innerHTML = `
                <input type="number" id="num1" placeholder="子弹" value="5" min="0" max="10">
                <input type="number" id="num2" placeholder="食物" value="5" min="0" max="10">
                <button class="option-btn" id="confirmTwo">确认分配 (总和必须为10)</button>
                <div id="twoInputError" style="color:#ffaa77; margin-left:10px;"></div>
            `;
            optionsDiv.innerHTML = "";
            optionsDiv.appendChild(container);
            const confirmBtn = document.getElementById("confirmTwo");
            const inp1 = document.getElementById("num1");
            const inp2 = document.getElementById("num2");
            const errorSpan = document.getElementById("twoInputError");
            
            const cleanup = () => {
                if (container.parentNode) container.remove();
            };
            
            const validateAndResolve = () => {
                let a = parseInt(inp1.value) || 0;
                let b = parseInt(inp2.value) || 0;
                if (a + b === 10 && a >= 0 && b >= 0) {
                    cleanup();
                    resolve({ a, b });
                } else {
                    errorSpan.innerText = "错误：子弹+食物必须等于10，请重新输入！";
                }
            };
            
            confirmBtn.onclick = validateAndResolve;
            inp1.addEventListener("keypress", (e) => { if(e.key === "Enter") validateAndResolve(); });
            inp2.addEventListener("keypress", (e) => { if(e.key === "Enter") validateAndResolve(); });
        });
    }
    
    function renderOptions() {

            optionsDiv.innerHTML = `<button class="option-btn menu-btn" data-act="menu">☠️ 主菜单</button>`;

            if (menuBtn) menuBtn.onclick = () => { if (!inGame) showMainMenu(); };
            return;
        }
        optionsDiv.innerHTML = "";
        for (let opt of currentOptions) {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => {
                if (window.tempChoiceHandler) window.tempChoiceHandler(opt.value);
                awaitingInput = false;
                renderOptions();
            };
            optionsDiv.appendChild(btn);
        }
    }

        let ch2 = await waitForOption(1,3);

        else if(swx==2 && ch2==2) { await Slowsay("你到处乱走，见人即杀，血染街道\n你站在尸山上狂笑\n"); mz=10086; }
        else if(swx==2 && ch2==3) { await Slowsay("你如一名老练的猎手忍耐着饥饿，跟踪进入幸存者基地。\n"); return false; }
        else if(ch2==3){ if(sw<2){ await esl(); return false; } sw-=2; await Slowsay("之后的每一天你都是这样"); if(sw<6){ await esl(); return false; } let rd=randInt(2); if(rd==1 && mp==0) { await hd1(); return false; } else { await bd3(); return false; } }
        else if(ch2==2){ let rd=randInt(3); if(rd!=0){ if(zd<2){ await mzdEnd(); return false; } zd-=2; await Slowsay("在到处乱走的过程中，你遇到了丧尸,子弹-2"); } else { await Slowsay("你走入了废墟找到弹药箱,子弹+6"); zd+=6; } }
        else if(ch2==1){ if(zd<4){ await mzdEnd(); return false; } zd-=4; await Slowsay("在前往商场的过程中，你遇到了丧尸,子弹-4\n你在商场发现了食物与子弹,食物+3,子弹+2"); sw+=3; zd+=2; }
